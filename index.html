<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GroundPlan">
<link rel="manifest" href="manifest.json">
<title>GroundPlan — ZeroScape</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111827;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{width:100%;max-width:360px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:22px}
.logo{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#22c55e,#15803d);display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 0 30px rgba(34,197,94,0.4)}
.title{color:#f9fafb;font-size:22px;font-weight:800;text-align:center}
.sub{color:#4b5563;font-size:11px;letter-spacing:2px;text-transform:uppercase;text-align:center}
.box{background:#1f2937;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:26px;width:100%;display:flex;flex-direction:column;gap:14px}
.lbl{color:#9ca3af;font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
input{background:#111827;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#f9fafb;padding:14px 16px;font-size:16px;outline:none;width:100%}
input:focus{border-color:#22c55e}
button{background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%}
.err{color:#f87171;font-size:13px;text-align:center;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">&#127807;</div>
  <div>
    <div class="title">GroundPlan</div>
    <div class="sub">ZeroScape Turf &mdash; Team Access</div>
  </div>
  <div class="box">
    <div class="lbl">Team Password</div>
    <input type="password" id="pw" placeholder="Enter password..." autocomplete="current-password">
    <button onclick="go()">Open GroundPlan &rarr;</button>
    <div class="err" id="err">Incorrect password. Try again.</div>
  </div>
</div>
<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
var PW = "zeroscape2025";
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
if(sessionStorage.getItem('gp_auth')===PW) location.replace('app.html');
function go(){
  var v=document.getElementById('pw').value;
  if(v===PW){sessionStorage.setItem('gp_auth',v);location.replace('app.html');}
  else{document.getElementById('err').style.display='block';document.getElementById('pw').value='';document.getElementById('pw').focus();}
}
</script>
</body>
</html>
